- name: Deploy dynamic Nginx configuration
  hosts: app_servers   # We install on WWW/App servers, not on the database!
  become: yes
  
  tasks:
    - name: Step 1 - Install Nginx server
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Step 2 - Render and copy the configuration template
      template:
        src: templates/my_app.conf.j2
        dest: /etc/nginx/sites-available/my_app
        owner: root
        group: root
        mode: '0644'
      notify: Reload Nginx

    - name: Step 3 - Activate configuration (create symbolic link)
      file:
        src: /etc/nginx/sites-available/my_app
        dest: /etc/nginx/sites-enabled/my_app
        state: link
      notify: Reload Nginx

    - name: Step 4 - Remove the default Nginx welcome page
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded  # 'reloaded' is better than 'restarted' - it doesn't interrupt ongoing connections!
        enabled: yes